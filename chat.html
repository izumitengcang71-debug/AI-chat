<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CharaChat - 会話</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- html2canvas for screenshot -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --accent: #9933ff;
      --accent-dark: #6600cc;
      --dark: #0d0d0d;
      --card-bg: #1a1a1a;
      --text-muted: #888;
    }
    * { box-sizing: border-box; }
    body {
      background-color: var(--dark);
      color: #eee;
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── ナビバー ── */
    .navbar {
      background-color: rgba(10,10,10,0.95) !important;
      border-bottom: 1px solid #2a2a2a;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
      width: 100%;
    }
    .navbar-brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff !important;
    }
    .navbar-brand span { color: var(--accent); }
    .nav-menu-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .15s;
    }
    .nav-menu-btn:hover { background: #222; color: #eee; }

    /* ── チャットレイアウト ── */
    .chat-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
      width: 100%;
    }

    /* ── サイドバー ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background-color: #111;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      overflow-y: auto;
    }
    .chara-avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #2a003a, #1a1a1a);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 12px;
    }
    .chara-name { text-align:center; font-size:1rem; font-weight:700; color:#eee; }
    .chara-desc { font-size:0.78rem; color:#888; text-align:center; margin-top:8px; line-height:1.5; }
    .tag {
      display:inline-block; font-size:0.68rem; color:var(--accent);
      background:#2a003a; border:1px solid #6600cc; border-radius:12px;
      padding:2px 8px; margin:2px;
    }
    .tag-area { text-align:center; margin-top:10px; }
    .divider { border-top:1px solid #2a2a2a; margin:16px 0; }
    .back-btn {
      display:block; text-align:center; font-size:0.8rem; color:#666;
      text-decoration:none; padding:6px; border-radius:8px; transition:color .2s, background .2s;
    }
    .back-btn:hover { color:var(--accent); background:#1a1a1a; }
    .sidebar-action-btn {
      width:100%; margin-top:6px;
      background:#1a1a1a; border:1px solid #333; color:#888;
      border-radius:8px; font-size:0.78rem; padding:7px 10px;
      cursor:pointer; text-align:left; transition:background .15s;
    }
    .sidebar-action-btn:hover { background:#2a2a2a; color:#eee; }
    .sidebar-action-btn.danger { border-color:#550022; color:#ff5577; }
    .sidebar-action-btn.danger:hover { background:#2a0010; }

    /* ── APIキー ── */
    .api-area { margin-top:auto; padding-top:16px; }
    .api-label { font-size:0.72rem; color:#666; margin-bottom:4px; }
    .api-input {
      width:100%; background:#0d0d0d !important; border:1px solid #333 !important;
      color:#eee !important; border-radius:6px; font-size:0.75rem; padding:6px 8px; outline:none;
    }
    .api-input:focus { border-color:var(--accent) !important; }
    .api-save-btn {
      width:100%; margin-top:6px; background:#2a2a2a; border:1px solid #444;
      color:#aaa; border-radius:6px; font-size:0.75rem; padding:5px; cursor:pointer;
    }
    .api-save-btn:hover { background:#333; color:#eee; }
    .api-status { font-size:0.7rem; text-align:center; margin-top:4px; height:14px; }
    .api-status.ok { color:#4caf50; }
    .api-status.err { color:#f44336; }

    /* ── チャットエリア ── */
    .chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .messages {
      flex:1; overflow-y:auto; padding:24px 20px;
      display:flex; flex-direction:column; gap:16px;
    }
    .messages::-webkit-scrollbar { width:4px; }
    .messages::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }

    /* 吹き出し */
    .msg {
      display:flex; gap:10px; max-width:75%;
      animation:fadeUp .2s ease;
      position:relative;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg.ai { align-self:flex-start; }
    .msg.ai .bubble {
      background:var(--card-bg); border:1px solid #2a2a2a;
      color:#eee; border-radius:4px 16px 16px 16px;
    }
    .msg-avatar {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,#2a003a,#1a1a1a);
      border:1px solid var(--accent);
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; flex-shrink:0;
    }
    .msg.user { align-self:flex-end; flex-direction:row-reverse; }
    .msg.user .bubble {
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      color:#fff; border-radius:16px 4px 16px 16px;
    }
    .bubble { padding:10px 14px; font-size:0.9rem; line-height:1.6; word-break:break-word; }

    /* ── 長押しメニュー ── */
    .msg-delete-btn {
      display:none;
      position:absolute; top:-8px; right:-8px;
      background:#ff3b30; color:#fff;
      border:none; border-radius:50%;
      width:22px; height:22px; font-size:0.7rem;
      align-items:center; justify-content:center;
      cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.4);
      z-index:10;
    }
    .msg:hover .msg-delete-btn { display:flex; }
    .msg.user .msg-delete-btn { right:auto; left:-8px; }

    /* コンテキストメニュー */
    .ctx-menu {
      position:fixed; background:#1e1e1e; border:1px solid #333;
      border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.5);
      z-index:1000; min-width:160px; overflow:hidden;
      display:none;
    }
    .ctx-menu.show { display:block; }
    .ctx-item {
      padding:11px 16px; font-size:0.85rem; color:#eee;
      cursor:pointer; display:flex; align-items:center; gap:10px;
      transition:background .12s;
    }
    .ctx-item:hover { background:#2a2a2a; }
    .ctx-item.danger { color:#ff5577; }
    .ctx-item.danger:hover { background:#2a0010; }
    .ctx-divider { border-top:1px solid #2a2a2a; }

    /* タイピング */
    .typing-dots span {
      display:inline-block; width:6px; height:6px;
      background:#888; border-radius:50%; margin:0 2px;
      animation:blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay:.2s; }
    .typing-dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes blink {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40%         { opacity:1; transform:scale(1); }
    }

    /* ウェルカム */
    .welcome {
      text-align:center; color:#444; font-size:0.85rem; margin:auto; padding:40px 20px;
    }
    .welcome-icon { font-size:2.5rem; margin-bottom:12px; }

    /* 入力エリア */
    .input-area {
      padding:10px 12px; border-top:1px solid #2a2a2a;
      background:#0f0f0f; display:flex; gap:8px; align-items:flex-end;
    }
    .ast-btn {
      width:36px; height:36px; flex-shrink:0;
      background:#1a1a1a; border:1px solid #444; border-radius:10px;
      color:#aaa; font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s;
    }
    .ast-btn:hover { background:#2a2a2a; color:#fff; }
    .msg-input {
      flex:1; background:#1a1a1a !important; border:1px solid #333 !important;
      color:#eee !important; border-radius:12px; font-size:0.9rem;
      padding:10px 14px; resize:none; outline:none;
      min-height:44px; max-height:120px; line-height:1.5; font-family:inherit;
    }
    .msg-input:focus { border-color:var(--accent) !important; }
    .msg-input::placeholder { color:#555; }
    .send-btn {
      width:44px; height:44px;
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      border:none; border-radius:12px; color:#fff; font-size:1.1rem;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:transform .15s, opacity .15s; flex-shrink:0;
    }
    .send-btn:hover:not(:disabled) { transform:scale(1.05); }
    .send-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── チャットメニュー（右上ドロワー） ── */
    .chat-menu-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200;
    }
    .chat-menu-overlay.show { display:block; }
    .chat-menu-panel {
      position:fixed; top:0; right:-280px; width:260px; height:100vh;
      background:#111; border-left:1px solid #2a2a2a;
      z-index:201; transition:right .25s ease;
      display:flex; flex-direction:column; padding:20px 16px;
    }
    .chat-menu-panel.show { right:0; }
    .chat-menu-title { font-size:1rem; font-weight:700; margin-bottom:16px; color:#eee; }
    .chat-menu-item {
      display:flex; align-items:center; gap:12px;
      padding:13px 14px; border-radius:10px; cursor:pointer;
      font-size:0.88rem; color:#ccc; transition:background .15s;
      border:none; background:none; width:100%; text-align:left;
      margin-bottom:4px;
    }
    .chat-menu-item:hover { background:#1e1e1e; color:#fff; }
    .chat-menu-item.danger { color:#ff5577; }
    .chat-menu-item.danger:hover { background:#2a0010; }
    .chat-menu-icon { font-size:1.1rem; width:22px; text-align:center; }

    /* トースト */
    .toast-msg {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
      background:#333; color:#eee; font-size:0.82rem;
      padding:10px 20px; border-radius:20px;
      opacity:0; transition:opacity .3s; z-index:500; white-space:nowrap;
    }
    .toast-msg.show { opacity:1; }

    /* スクショ用：チャット画面だけ撮る時のスタイル調整 */

    /* 画像拡大モーダル */
    .img-modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.9); z-index:999;
      align-items:center; justify-content:center;
      cursor:pointer;
    }
    .img-modal-overlay.show { display:flex; }
    .img-modal-overlay img {
      max-width:90vw; max-height:90vh;
      border-radius:12px; object-fit:contain;
    }
    .img-modal-close {
      position:absolute; top:16px; right:16px;
      background:rgba(0,0,0,.6); border:none; color:#fff;
      font-size:1.5rem; width:40px; height:40px;
      border-radius:50%; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }

    /* トークプロフィールモーダル */
    .tp-modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.7); z-index:300;
    }
    .tp-modal-overlay.show { display:block; }
    .tp-modal {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:390px;
      background:#111; border-radius:20px 20px 0 0;
      border:1px solid #2a2a2a; z-index:301;
      padding:20px 0 40px; max-height:80vh; overflow-y:auto;
      display:none;
    }
    .tp-modal.show { display:block; }
    .tp-modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px 14px; border-bottom:1px solid #2a2a2a;
    }
    .tp-modal-title { font-size:.95rem; font-weight:700; color:#eee; }
    .tp-modal-close { background:none; border:none; color:#666; font-size:1.2rem; cursor:pointer; }
    .tp-item {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; cursor:pointer; border-bottom:1px solid #1a1a1a;
      transition:background .15s;
    }
    .tp-item:hover { background:#1a1a1a; }
    .tp-item.active { background:#2a003a; }
    .tp-avatar {
      width:44px; height:44px; border-radius:50%; background:#2a2a2a;
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; flex-shrink:0; overflow:hidden; border:2px solid #333;
    }
    .tp-avatar img { width:100%; height:100%; object-fit:cover; }
    .tp-info { flex:1; min-width:0; }
    .tp-name { font-size:.88rem; font-weight:700; color:#eee; }
    .tp-desc { font-size:.72rem; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    .tp-check { color:#9933ff; font-size:1.1rem; }
    .tp-add-btn {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; cursor:pointer;
      color:#9933ff; font-size:.88rem;
    }
    .tp-add-icon {
      width:44px; height:44px; border-radius:50%; background:#2a003a;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; border:2px solid #6600cc; flex-shrink:0;
    }
    @media print { body { background:#0d0d0d; } }

    @media (max-width:640px) {
      .sidebar { display:none; }
      .chat-main { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ナビバー -->
<nav class="navbar sticky-top">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="index.html"><span>Chara</span>Chat</a>
    <span id="nav-chara-name" style="font-size:0.85rem;color:#888;flex:1;text-align:center;"></span>
    <button class="nav-menu-btn" onclick="openChatMenu()" title="メニュー">☰</button>
  </div>
</nav>

<div class="chat-wrapper">
  <!-- サイドバー -->
  <div class="sidebar">
    <div class="chara-avatar" id="side-avatar" style="overflow:hidden;padding:0;">
      <span id="side-avatar-emoji" style="font-size:2rem;">🎭</span>
    </div>
    <div class="chara-name" id="side-name">-</div>
    <div class="chara-desc" id="side-desc"></div>
    <div class="tag-area" id="side-tags"></div>

    <div class="divider"></div>
    <a href="index.html" class="back-btn">← キャラ一覧に戻る</a>

    <div style="margin-top:12px;font-size:0.75rem;color:#555;font-weight:600;margin-bottom:6px;">メニュー</div>
    <button class="sidebar-action-btn" onclick="exportText()">💾 会話をテキスト保存</button>
    <button class="sidebar-action-btn" onclick="exportImage()">📸 会話を画像で保存</button>
    <button class="sidebar-action-btn danger" onclick="clearHistory()">🗑 会話履歴を削除</button>

    <div class="api-area">
      <div class="api-label">🔑 Groq APIキー</div>
      <input type="password" class="api-input" id="api-key-input" placeholder="gsk_...">
      <button class="api-save-btn" onclick="saveApiKey()">保存する</button>
      <div class="api-status" id="api-status"></div>
      <div style="font-size:0.65rem;color:#555;margin-top:6px;text-align:center;">
        <a href="https://console.groq.com/keys" target="_blank" style="color:#666;">APIキーを取得 →</a>
      </div>
    </div>
  </div>

  <!-- チャットメイン -->
  <div class="chat-main">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome-msg">
        <div class="welcome-icon" id="welcome-icon">🎭</div>
        <div id="welcome-img-wrap" style="display:none;width:120px;height:120px;border-radius:50%;overflow:hidden;margin:0 auto 12px;border:2px solid #9933ff;">
          <img id="welcome-img" src="" style="width:100%;height:100%;object-fit:cover;object-position:top;">
        </div>
        <div id="welcome-text">キャラを選んで会話を始めよう</div>
        <div style="margin-top:8px;font-size:0.75rem;color:#333;">※ サイドバーにGroq APIキーを入力してください</div>
      </div>
    </div>
    <div class="input-area">
      <button class="ast-btn" onclick="insertAsterisk()" title="＊を挿入">＊</button>
      <textarea class="msg-input" id="msg-input" placeholder="メッセージを入力..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="送信">➤</button>
    </div>
  </div>
</div>

<!-- チャットメニューオーバーレイ -->
<div class="chat-menu-overlay" id="chatMenuOverlay" onclick="closeChatMenu()"></div>
<div class="chat-menu-panel" id="chatMenuPanel">
  <div class="chat-menu-title">メニュー</div>
  <button class="chat-menu-item" onclick="exportText();closeChatMenu()">
    <span class="chat-menu-icon">💾</span>会話をテキスト保存
  </button>
  <button class="chat-menu-item" onclick="exportImage();closeChatMenu()">
    <span class="chat-menu-icon">📸</span>会話を画像で保存
  </button>
  <button class="chat-menu-item" onclick="shareChat();closeChatMenu()">
    <span class="chat-menu-icon">🔗</span>会話内容をコピー
  </button>
  <div style="height:1px;background:#2a2a2a;margin:8px 0;"></div>
  <button class="chat-menu-item" onclick="openTalkProfileMenu();closeChatMenu()">
    <span class="chat-menu-icon">👤</span>トークプロフィール
    <span id="active-profile-label" style="margin-left:auto;font-size:.75rem;color:#888;"></span>
  </button>
  <div style="height:1px;background:#2a2a2a;margin:8px 0;"></div>
  <button class="chat-menu-item" onclick="clearHistory();closeChatMenu()">
    <span class="chat-menu-icon">🗑</span>会話履歴を削除
  </button>
  <a href="index.html" class="chat-menu-item" style="text-decoration:none;">
    <span class="chat-menu-icon">🏠</span>ホームへ戻る
  </a>
</div>

<!-- コンテキストメニュー（長押し） -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxCopy">📋 このメッセージをコピー</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" id="ctxDelete">🗑 このメッセージを削除</div>
</div>

<!-- トークプロフィールモーダル -->
<div class="tp-modal-overlay" id="tpModalOverlay" onclick="closeTalkProfileMenu()"></div>
<div class="tp-modal" id="tpModal">
  <div class="tp-modal-header">
    <span class="tp-modal-title">マイトークプロフィール</span>
    <button class="tp-modal-close" onclick="closeTalkProfileMenu()">✕</button>
  </div>
  <div class="tp-add-btn" onclick="openNewTalkProfile()">
    <div class="tp-add-icon">＋</div>
    <span>トークプロフィール追加</span>
  </div>
  <div id="tp-list"></div>
</div>

<!-- 画像拡大モーダル -->
<div class="img-modal-overlay" id="imgModal" onclick="closeImgModal()">
  <button class="img-modal-close" onclick="closeImgModal()">✕</button>
  <img id="imgModalImg" src="" alt="">
</div>

<div class="toast-msg" id="toastMsg"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ================================
// 画像データ

// ================================
// 初期化
// ================================
let currentChar = null;
let chatHistory = [];
let apiKey = localStorage.getItem('groq_api_key') || '';
let isLoading = false;
let ctxTargetMsg = null; // 右クリック/長押し対象のメッセージ
let ctxTargetIndex = -1;

const params = new URLSearchParams(location.search);
const charId = params.get('id');

// ユーザーキャラも読み込む
function getAllChars() {
  const base = CHARACTERS;
  try {
    const user = JSON.parse(localStorage.getItem('user_chars') || '[]');
    const extra = {};
    user.forEach(c => { extra[c.id] = c; });
    return { ...base, ...extra };
  } catch(e) { return base; }
}

if (charId) {
  const all = getAllChars();
  if (all[charId]) {
    currentChar = all[charId];
    const savedHistory = localStorage.getItem('chat_history_' + charId);
    if (savedHistory) {
      try { chatHistory = JSON.parse(savedHistory); } catch(e) { chatHistory = []; }
    }
    initChar();
    if (chatHistory.length > 0) {
      document.getElementById('welcome-msg')?.remove();
      chatHistory.forEach((msg, idx) => appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, idx));
    } else if (currentChar.intro) {
      document.getElementById('welcome-msg')?.remove();
      appendMessage('ai', currentChar.intro, 0);
      chatHistory.push({ role: 'assistant', content: currentChar.intro });
      try { localStorage.setItem('chat_history_' + charId, JSON.stringify(chatHistory)); } catch(e) {}
    }
  }
}

updateActiveProfileLabel();
if (apiKey) {
  document.getElementById('api-key-input').value = apiKey;
  document.getElementById('api-status').textContent = '✓ 設定済み';
  document.getElementById('api-status').className = 'api-status ok';
}

// ================================
// キャラ表示初期化
// ================================
function initChar() {
  const c = currentChar;
  document.title = `CharaChat - ${c.name}`;
  document.getElementById('nav-chara-name').textContent = c.name + ' と会話中';
  const sideAv = document.getElementById('side-avatar');
  const sideEmoji = document.getElementById('side-avatar-emoji');
  if (c.img && (CHAR_IMAGES[c.img] || (c.img && c.img.startsWith('data:')))) {
    const imgSrc = CHAR_IMAGES[c.img] || c.img;
    sideAv.style.padding = '0'; sideAv.style.overflow = 'hidden';
    sideEmoji.style.display = 'none';
    const existing = sideAv.querySelector('img');
    if (existing) existing.remove();
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%;';
    sideAv.appendChild(img);
  } else {
    sideEmoji.textContent = c.emoji || '🎭';
    sideEmoji.style.display = '';
  }
  if (c.img && (CHAR_IMAGES[c.img] || c.img.startsWith('data:'))) {
    const imgSrc = CHAR_IMAGES[c.img] || c.img;
    document.getElementById('welcome-icon').style.display = 'none';
    document.getElementById('welcome-img-wrap').style.display = 'block';
    document.getElementById('welcome-img').src = imgSrc;
  } else {
    document.getElementById('welcome-icon').textContent = c.emoji || '🎭';
    document.getElementById('welcome-icon').style.display = 'block';
    document.getElementById('welcome-img-wrap').style.display = 'none';
  }
  document.getElementById('side-name').textContent = c.name;
  document.getElementById('side-desc').textContent = c.desc || '';
  document.getElementById('welcome-text').textContent = `${c.name} との会話を始めよう`;
  const tagArea = document.getElementById('side-tags');
  tagArea.innerHTML = (c.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
}

// ================================
// メッセージ追加（長押し対応）
// ================================
function getImgSrc(c) {
  if (!c || !c.img) return null;
  if (CHAR_IMAGES[c.img]) return CHAR_IMAGES[c.img];
  if (c.img.startsWith('data:')) return c.img;
  return null;
}

function appendMessage(role, text, historyIndex) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.dataset.idx = historyIndex ?? chatHistory.length;

  const isAI = role === 'ai';
  const imgSrc = getImgSrc(currentChar);
  let avatarHtml = '';
  if (isAI) {
    avatarHtml = imgSrc
      ? `<div class="msg-avatar" style="overflow:hidden;padding:0;cursor:pointer;" onclick="openImgModal(\'${imgSrc}\')"><img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%;"></div>`
      : `<div class="msg-avatar">${currentChar?.emoji || '🎭'}</div>`;
  }

  div.innerHTML = isAI
    ? `${avatarHtml}<div class="bubble">${escHtml(text)}</div><button class="msg-delete-btn" title="削除">✕</button>`
    : `<div class="bubble">${escHtml(text)}</div><button class="msg-delete-btn" title="削除">✕</button>`;

  // 削除ボタン
  div.querySelector('.msg-delete-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    deleteMessageAt(div);
  });

  // 長押し / 右クリックでコンテキストメニュー
  let pressTimer = null;
  div.addEventListener('pointerdown', (e) => {
    pressTimer = setTimeout(() => { showCtxMenu(e, div, text); }, 500);
  });
  div.addEventListener('pointerup', () => { clearTimeout(pressTimer); });
  div.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
  div.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showCtxMenu(e, div, text);
  });

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

// ================================
// メッセージ削除
// ================================
function deleteMessageAt(msgEl) {
  const idx = parseInt(msgEl.dataset.idx);
  if (isNaN(idx)) { msgEl.remove(); return; }
  // 1件削除
  chatHistory.splice(idx, 1);
  try { localStorage.setItem('chat_history_' + charId, JSON.stringify(chatHistory)); } catch(e) {}
  // DOM再構築
  rebuildMessages();
  showToast('メッセージを削除しました');
}

function rebuildMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  if (chatHistory.length === 0) {
    if (currentChar?.intro) {
      appendMessage('ai', currentChar.intro, 0);
      chatHistory.push({ role: 'assistant', content: currentChar.intro });
      try { localStorage.setItem('chat_history_' + charId, JSON.stringify(chatHistory)); } catch(e) {}
    }
    return;
  }
  chatHistory.forEach((msg, idx) => appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, idx));
}

// ================================
// コンテキストメニュー（長押し）
// ================================
function showCtxMenu(e, el, text) {
  const menu = document.getElementById('ctxMenu');
  ctxTargetMsg = el;
  const x = Math.min(e.clientX, window.innerWidth - 180);
  const y = Math.min(e.clientY, window.innerHeight - 100);
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  menu.classList.add('show');

  document.getElementById('ctxCopy').onclick = () => {
    navigator.clipboard?.writeText(text).catch(() => {});
    showToast('コピーしました');
    closeCtxMenu();
  };
  document.getElementById('ctxDelete').onclick = () => {
    if (ctxTargetMsg) deleteMessageAt(ctxTargetMsg);
    closeCtxMenu();
  };
}
function closeCtxMenu() {
  document.getElementById('ctxMenu').classList.remove('show');
  ctxTargetMsg = null;
}
document.addEventListener('click', closeCtxMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeCtxMenu(); closeChatMenu(); } });

// ================================
// 会話履歴クリア
// ================================
function clearHistory() {
  if (!confirm('会話履歴を削除しますか？')) return;
  chatHistory = [];
  if (charId) localStorage.removeItem('chat_history_' + charId);
  rebuildMessages();
  showToast('会話履歴を削除しました');
}

// ================================
// テキストエクスポート
// ================================
function exportText() {
  if (chatHistory.length === 0) { showToast('会話がまだありません'); return; }
  const charName = currentChar?.name || 'キャラ';
  const lines = chatHistory.map(m => {
    const who = m.role === 'user' ? 'あなた' : charName;
    return `[${who}]
${m.content}
`;
  });
  const header = `【CharaChat - ${charName} との会話】
日時: ${new Date().toLocaleString('ja-JP')}
${'-'.repeat(30)}

`;
  const blob = new Blob([header + lines.join('
')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `charaChat_${charName}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('テキストを保存しました');
}

// ================================
// 画像エクスポート（スクリーンショット）
// ================================
async function exportImage() {
  if (chatHistory.length === 0) { showToast('会話がまだありません'); return; }
  showToast('画像を生成中...');
  const msgs = document.getElementById('messages');
  try {
    const canvas = await html2canvas(msgs, {
      backgroundColor: '#0d0d0d',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = `charaChat_${currentChar?.name || 'chat'}_${new Date().toISOString().slice(0,10)}.png`;
    a.click();
    showToast('画像を保存しました！');
  } catch(e) {
    showToast('画像の生成に失敗しました');
    console.error(e);
  }
}

// ================================
// 会話内容コピー
// ================================
function shareChat() {
  if (chatHistory.length === 0) { showToast('会話がまだありません'); return; }
  const charName = currentChar?.name || 'キャラ';
  const text = chatHistory.map(m => `[${m.role === 'user' ? 'あなた' : charName}] ${m.content}`).join('

');
  navigator.clipboard?.writeText(text).then(() => {
    showToast('クリップボードにコピーしました');
  }).catch(() => showToast('コピーに失敗しました'));
}

// ================================
// チャットメニュー開閉
// ================================
function openChatMenu() {
  document.getElementById('chatMenuOverlay').classList.add('show');
  document.getElementById('chatMenuPanel').classList.add('show');
}
function closeChatMenu() {
  document.getElementById('chatMenuOverlay').classList.remove('show');
  document.getElementById('chatMenuPanel').classList.remove('show');
}

// ================================
// APIキー保存
// ================================
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('groq_api_key', val);
  document.getElementById('api-status').textContent = '✓ 保存しました';
  document.getElementById('api-status').className = 'api-status ok';
}

// ================================
// メッセージ送信
// ================================

// ================================
// トークプロフィール機能
// ================================
function loadTalkProfiles() {
  try { return JSON.parse(localStorage.getItem('talk_profiles') || '[]'); } catch(e) { return []; }
}
function saveTalkProfiles(arr) { localStorage.setItem('talk_profiles', JSON.stringify(arr)); }

function getActiveTalkProfile() {
  try { return JSON.parse(localStorage.getItem('active_talk_profile') || 'null'); } catch(e) { return null; }
}

function updateActiveProfileLabel() {
  const p = getActiveTalkProfile();
  const el = document.getElementById('active-profile-label');
  if (el) el.textContent = p ? p.name : '未設定';
}

function openTalkProfileMenu() {
  const profiles = loadTalkProfiles();
  const active = getActiveTalkProfile();
  const list = document.getElementById('tp-list');
  list.innerHTML = profiles.map((p, i) => {
    const isActive = active && active.id === p.id;
    const avatarHtml = p.avatar
      ? `<div class="tp-avatar"><img src="${p.avatar}"></div>`
      : `<div class="tp-avatar">👤</div>`;
    return `<div class="tp-item${isActive?' active':''}" onclick="selectTalkProfile(${i})">
      ${avatarHtml}
      <div class="tp-info">
        <div class="tp-name">${p.name}</div>
        <div class="tp-desc">${p.desc||''}</div>
      </div>
      ${isActive ? '<span class="tp-check">✓</span>' : ''}
    </div>`;
  }).join('');
  if (profiles.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#555;font-size:.82rem;">トークプロフィールがありません</div>';
  }
  document.getElementById('tpModalOverlay').classList.add('show');
  document.getElementById('tpModal').classList.add('show');
}

function closeTalkProfileMenu() {
  document.getElementById('tpModalOverlay').classList.remove('show');
  document.getElementById('tpModal').classList.remove('show');
}

function selectTalkProfile(index) {
  const profiles = loadTalkProfiles();
  if (index < 0 || index >= profiles.length) {
    localStorage.removeItem('active_talk_profile');
  } else {
    localStorage.setItem('active_talk_profile', JSON.stringify(profiles[index]));
  }
  updateActiveProfileLabel();
  closeTalkProfileMenu();
  showToast('トークプロフィールを設定しました');
}

function openNewTalkProfile() {
  closeTalkProfileMenu();
  // index.htmlのトークプロフィール作成画面へ
  window.location.href = 'index.html?action=new_talk_profile';
}

// ================================
// ＊ボタン・画像拡大
// ================================
function insertAsterisk() {
  const input = document.getElementById('msg-input');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  input.value = val.substring(0, start) + '*' + val.substring(end);
  input.selectionStart = input.selectionEnd = start + 1;
  input.focus();
  autoResize(input);
}
function openImgModal(src) {
  document.getElementById('imgModalImg').src = src;
  document.getElementById('imgModal').classList.add('show');
}
function closeImgModal() {
  document.getElementById('imgModal').classList.remove('show');
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) {
    alert('サイドバーにGroq APIキーを入力してください。
取得は無料です→ https://console.groq.com/keys');
    return;
  }
  if (!currentChar) {
    alert('URLにキャラIDが指定されていません（例: chat.html?id=alexis）');
    return;
  }
  document.getElementById('welcome-msg')?.remove();
  const msgIdx = chatHistory.length;
  appendMessage('user', text, msgIdx);
  chatHistory.push({ role: 'user', content: text });
  try { localStorage.setItem('chat_history_' + charId, JSON.stringify(chatHistory.slice(-60))); } catch(e) {}
  input.value = '';
  autoResize(input);
  const typingId = appendTyping();
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  try {
    const reply = await callGroq(text);
    removeTyping(typingId);
    const replyIdx = chatHistory.length;
    appendMessage('ai', reply, replyIdx);
    chatHistory.push({ role: 'assistant', content: reply });
    try { localStorage.setItem('chat_history_' + charId, JSON.stringify(chatHistory.slice(-60))); } catch(e) {}
    // トークカウント増加
    if (charId) {
      const cur = parseInt(localStorage.getItem('talk_count_' + charId) || '0', 10);
      localStorage.setItem('talk_count_' + charId, cur + 1);
    }
  } catch(e) {
    removeTyping(typingId);
    appendMessage('ai', `⚠️ エラーが発生しました。
${e.message}`, chatHistory.length);
    if (e.message.includes('401') || e.message.includes('invalid_api_key')) {
      document.getElementById('api-status').textContent = '✗ APIキーが無効です';
      document.getElementById('api-status').className = 'api-status err';
    }
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ================================
// Groq API
// ================================
async function callGroq(userText) {
  const url = 'https://api.groq.com/openai/v1/chat/completions';
  const history = chatHistory.slice(-20);
  // {{user}}をユーザー名に置換
  let systemPrompt = currentChar.system || '';
  try {
    const profile = JSON.parse(localStorage.getItem('my_profile') || 'null');
    const talkProfile = JSON.parse(localStorage.getItem('active_talk_profile') || 'null');
    const userName = (talkProfile?.name) || (profile?.name) || 'あなた';
    systemPrompt = systemPrompt.replace(/{{user}}/g, userName);
    if (talkProfile?.desc) {
      systemPrompt += `

【ユーザープロフィール】
名前: ${talkProfile.name}
${talkProfile.desc}`;
    }
  } catch(e) {}
  const messages = [
    { role: 'system', content: systemPrompt },
    ...history
  ];
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages,
      max_tokens: 1024,
      temperature: 0.9
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || res.statusText);
  return data.choices?.[0]?.message?.content || '（返答がありませんでした）';
}

// ================================
// タイピングアニメ
// ================================
function appendTyping() {
  const msgs = document.getElementById('messages');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = id;
  const imgSrc = getImgSrc(currentChar);
  const tAvatar = imgSrc
    ? `<div class="msg-avatar" style="overflow:hidden;padding:0;cursor:pointer;" onclick="openImgModal(\'${imgSrc}\')"><img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%;"></div>`
    : `<div class="msg-avatar">${currentChar?.emoji || '🎭'}</div>`;
  div.innerHTML = `${tAvatar}<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }

// ================================
// HTML エスケープ
// ================================
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/
/g, '<br>')
    .replace(/\*([^*]+)\*/g, '<span style="color:#888;font-style:italic;">*$1*</span>');
}

// ================================
// テキストエリア自動リサイズ
// ================================
const msgInput = document.getElementById('msg-input');
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
msgInput.addEventListener('input', () => autoResize(msgInput));
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ================================
// トースト通知
// ================================
function showToast(msg) {
  const t = document.getElementById('toastMsg');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
